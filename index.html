<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test Page</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 40px;
      background: #f4f4f4;
      color: #222;
    }

    .box {
      max-width: 600px;
      padding: 24px;
      background: white;
      border: 1px solid #ddd;
      border-radius: 8px;
    }

    button {
      padding: 10px 16px;
      border: 0;
      border-radius: 6px;
      background: #2563eb;
      color: white;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>Hello, HTML!</h1>
    <p>This is a simple test page.</p>
    <button onclick="alert('Button clicked!')">Click me</button>
  </div>
</body>
</html>
